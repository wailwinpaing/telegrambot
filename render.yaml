services:
  - type: worker
    name: my-truemoney-bot
    runtime: python
    plan: starter        # polling အတွက် starter plan လိုအပ်ပါတယ်
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
